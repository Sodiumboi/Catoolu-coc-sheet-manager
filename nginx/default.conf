server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── API requests → backend container ──────────────────
    # Any request starting with /api is proxied to the backend
    location /api/ {
        proxy_pass         http://backend:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;

        # Allow large uploads (portraits are base64 encoded)
        client_max_body_size 15m;
    }

    # ── React app — handle client-side routing ─────────────
    # Without this, refreshing /dashboard returns 404
    # because Nginx looks for a file called "dashboard"
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Cache static assets ────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}