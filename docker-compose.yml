# Docker Compose file for CoC Manager
# Version 3.8 is widely supported and stable
version: '3.8'

services:

  # ── PostgreSQL Database ──────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: coc_postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB:       coc_production
      POSTGRES_USER:     coc_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}

    volumes:
      # Named volume — data persists even if container is recreated
      - postgres_data:/var/lib/postgresql/data
      # Auto-run schema on first start
      - ./backend/sql/schema.sql:/docker-entrypoint-initdb.d/schema.sql

    # Only accessible to other containers, not the outside world
    expose:
      - "5432"

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coc_user -d coc_production"]
      interval: 10s
      timeout:  5s
      retries:  5

  # ── Express Backend ──────────────────────────────────────
  backend:
    build:
      context:    ./backend
      dockerfile: Dockerfile
    container_name: coc_backend
    restart: unless-stopped

    # Load production environment variables
    env_file:
      - ./backend/.env.production

    # Don't start until PostgreSQL is healthy
    depends_on:
      postgres:
        condition: service_healthy

    expose:
      - "3001"

    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/api/health || exit 1"]
      interval: 30s
      timeout:  10s
      retries:  3

  # ── React Frontend (Nginx) ───────────────────────────────
  frontend:
    build:
      context:    ./frontend
      dockerfile: Dockerfile
    container_name: coc_frontend
    restart: unless-stopped

    # Map host port 8088 → container port 80
    # Access at http://192.168.1.42:8088
    ports:
      - "8088:80"

    depends_on:
      - backend

# ── Named Volumes ────────────────────────────────────────────
volumes:
  postgres_data:
    # This volume lives at /var/lib/docker/volumes/coc-manager_postgres_data
    # on your ZimaOS server — data survives container restarts